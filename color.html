
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-primary">Rajan (primary)</h1>
    <p class="text-success">BCA (Success Text)</p>
    <p class="text-danger">KAMARAJ COLLEGE (Danger Text)</p>

    <div class="p-3 mb-3 bg-warning text-dark">
        This is a Warning Background
    </div>

    <div class="p-3 mb-3 bg-info text-white">
        This is an Info Background
    </div>

    <div class="alert alert-success">
        This is a Success Alert!
    </div>

    <div class="alert alert-danger">
        This is a Danger Alert!
    </div>

    <button class="btn btn-primary">Primary Button</button>
    <button class="btn btn-success">Success Button</button>
    <button class="btn btn-danger">Danger Button</button>

    <br><br>

    <h3>
        Notifications <span class="badge bg-danger">5</span>
    </h3>

    <button class="btn btn-info">
        Messages <span class="badge bg-dark">10</span>
    </button>

</div>

</body>
</html>
